name: Daily Pipeline (Data + Drift Check)

on:
  schedule:
    - cron: '0 1 * * *'   # 8:00 AM Vietnam time (UTC+7) mỗi ngày
  workflow_dispatch:        # Cho phép chạy tay

env:
  PROJECT_ID: weather-forecasting-494811
  REGION: asia-southeast1

permissions:
  contents: read
  issues: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      sustained_drift: ${{ steps.drift.outputs.sustained_drift }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download models from GCS
        run: |
          mkdir -p models/current
          gcloud storage cp gs://${{ env.PROJECT_ID }}-models/models/current/* ./models/current/ || echo "⚠ No models found"

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Run Daily Pipeline
        id: drift
        env:
          PYTHONPATH: ${{ github.workspace }}
          USE_GCS: "true"
          USE_BIGQUERY: "true"
          ENABLE_VERTEX_METRICS: "false"
        run: |
          echo "🔄 Running daily pipeline..."

          # Tạo thư mục cần thiết
          mkdir -p data models/current

          # Chạy pipeline và in ra log trực tiếp (không ẩn lỗi)
          set +e   # Không thoát ngay khi lỗi
          python daily_pipeline.py 2>&1 | tee /tmp/pipeline_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "Exit code: $EXIT_CODE"

          # Kiểm tra sustained drift từ output
          if grep -q "Sustained drift detected\|sustained_drift.*true" /tmp/pipeline_output.txt; then
            echo "sustained_drift=true" >> $GITHUB_OUTPUT
            echo "⚠️ Sustained drift detected! Will trigger retrain."
          else
            echo "sustained_drift=false" >> $GITHUB_OUTPUT
            echo "✅ No sustained drift."
          fi

          # Thoát với exit code gốc
          exit $EXIT_CODE

      - name: Create drift alert issue (if drift)
        if: steps.drift.outputs.sustained_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Sustained Model Drift Detected - ${new Date().toISOString().split('T')[0]}`,
              body: `## Sustained Model Drift Alert\n\nSustained drift (7 consecutive days) detected during daily pipeline run.\n\nRetrain job will be triggered automatically.\n\n**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['drift', 'auto-retrain']
            })

  # Trigger retrain nếu sustained drift (7 ngày liên tiếp)
  trigger-retrain:
    needs: daily-pipeline
    if: needs.daily-pipeline.outputs.sustained_drift == 'true'
    uses: ./.github/workflows/retrain.yml
    secrets: inherit
