name: Daily Weather Pipeline

on:
  workflow_dispatch:  # Chạy tay bất kỳ lúc nào
  schedule:
    # Mỗi ngày lúc 00:00 UTC = 07:00 VN
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Train có thể mất 30-40 phút

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Cần fetch full history để git push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data models/current models/archive

      - name: Step 1 — Fetch today weather data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          python -m src.data_pipeline.fetch_data

      - name: Step 2 — DB Stats
        run: |
          python -c "
          from src.config.db import get_connection
          with get_connection() as conn:
              h = conn.execute('SELECT COUNT(*) FROM weather_historical').fetchone()[0]
              f = conn.execute('SELECT COUNT(*) FROM weather_forecast').fetchone()[0]
              c = conn.execute('SELECT COUNT(*) FROM weather_current').fetchone()[0]
          print(f'Historical: {h:,} | Forecast: {f:,} | Current: {c:,}')
          "

      - name: Step 3 — Train Prophet + LSTM (multi-city)
        env:
          PYTHONIOENCODING: utf-8
          TF_CPP_MIN_LOG_LEVEL: '2'  # Suppress TF warnings
        run: |
          python -c "
          from src.training.retrain_pipeline import run_retrain_pipeline
          result = run_retrain_pipeline()
          print(f'Pipeline result: {result}')
          "

      - name: Show outputs
        run: |
          echo "=== Data ===" && ls -la data/ || true
          echo "=== Models ===" && ls -la models/current/ || true
          echo "=== DB Size ===" && du -sh data/weather_forecast.db || true

      - name: Commit updated data & models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage everything
          git add data/weather_forecast.db
          git add models/ -A
          git add logs/ -A || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COMMIT_MSG="🤖 Daily pipeline — $(date +'%Y-%m-%d')"
            
            # Add metrics summary to commit
            if [ -f models/registry.json ]; then
              COMMIT_MSG="$COMMIT_MSG | Models updated"
            fi
            
            git commit -m "$COMMIT_MSG"

            # Merge instead of rebase — binary files (.db, .h5) can't rebase
            # -X theirs = pipeline's fresh data always wins on conflict
            git pull --no-rebase -X theirs origin main || true
            git push
            echo "✅ Changes committed and pushed!"
          fi
