version: '3.8'

services:
  data-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn services.data_api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - weather-net

  prophet-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn services.prophet_api.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    volumes:
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - weather-net

  lstm-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn services.lstm_api.main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    volumes:
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - weather-net

  forecast-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn services.forecast_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATA_API_URL=http://data-api:8001
      - LSTM_API_URL=http://lstm-api:8004
      - PROPHET_API_URL=http://prophet-api:8003
    env_file:
      - .env
    depends_on:
      data-api:
        condition: service_healthy
      lstm-api:
        condition: service_healthy
      prophet-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - weather-net

  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./services/dashboard_ui:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - weather-net

  retrain-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python daily_pipeline.py
    volumes:
      - ./models:/app/models
    environment:
      - LSTM_API_URL=http://lstm-api:8004
      - PROPHET_API_URL=http://prophet-api:8003
    env_file:
      - .env
    depends_on:
      lstm-api:
        condition: service_healthy
      prophet-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - weather-net

networks:
  weather-net:
    driver: bridge
