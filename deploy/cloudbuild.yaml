# Cloud Build — Build & Deploy all services to Cloud Run
# Trigger: Push to main branch
#
# Usage:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_REGION=asia-southeast1

substitutions:
  _REGION: asia-southeast1

steps:
  # ── Build Docker Images ──

  - id: 'build-data-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:latest'
      - '-f'
      - 'deploy/Dockerfile.data-api'
      - '.'

  - id: 'build-forecast-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:latest'
      - '-f'
      - 'deploy/Dockerfile.forecast-api'
      - '.'

  - id: 'build-prophet-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:latest'
      - '-f'
      - 'deploy/Dockerfile.prophet-api'
      - '.'

  - id: 'build-lstm-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:latest'
      - '-f'
      - 'deploy/Dockerfile.lstm-api'
      - '.'

  - id: 'build-retrain'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/retrain:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/retrain:latest'
      - '-f'
      - 'deploy/Dockerfile.retrain'
      - '.'

  # ── Push Images ──

  - id: 'push-images'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:$COMMIT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:$COMMIT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:$COMMIT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:$COMMIT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/retrain:$COMMIT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/retrain:latest

  # ── Deploy to Cloud Run ──

  - id: 'deploy-data-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'data-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=DB_TYPE=postgres'
      - '--update-secrets=DB_USER=db-user:latest,DB_PASS=db-password:latest,DB_NAME=db-name:latest,INSTANCE_CONNECTION_NAME=db-instance:latest,OPENWEATHER_API_KEY=owm-api-key:latest'
      - '--add-cloudsql-instances=$(gcloud secrets versions access latest --secret=db-instance)'

  - id: 'deploy-forecast-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'forecast-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--update-secrets=OPENWEATHER_API_KEY=owm-api-key:latest'

  - id: 'deploy-prophet-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prophet-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--concurrency=10'
      - '--cpu-boost'
      - '--set-env-vars=USE_GCS=true,GCS_BUCKET=weather-models-${PROJECT_ID}'

  - id: 'deploy-lstm-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lstm-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=4'
      - '--cpu-boost'
      - '--set-env-vars=USE_GCS=true,GCS_BUCKET=weather-models-${PROJECT_ID}'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/retrain:$COMMIT_SHA'

timeout: '1800s'  # 30 minutes max build time

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Faster builds
