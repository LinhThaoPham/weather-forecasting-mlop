# Cloud Build — Build & Deploy all services to Cloud Run
# Usage: gcloud builds submit --config deploy/cloudbuild.yaml

substitutions:
  _REGION: asia-southeast1
  _TAG: latest

steps:
  # ── Build Docker Images (parallel) ──

  - id: 'build-data-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:${_TAG}', '-f', 'deploy/Dockerfile.data-api', '.']

  - id: 'build-forecast-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:${_TAG}', '-f', 'deploy/Dockerfile.forecast-api', '.']
    waitFor: ['-']

  - id: 'build-prophet-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:${_TAG}', '-f', 'deploy/Dockerfile.prophet-api', '.']
    waitFor: ['-']

  - id: 'build-lstm-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:${_TAG}', '-f', 'deploy/Dockerfile.lstm-api', '.']
    waitFor: ['-']

  # ── Push Images ──

  - id: 'push-data-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:${_TAG}']
    waitFor: ['build-data-api']

  - id: 'push-forecast-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:${_TAG}']
    waitFor: ['build-forecast-api']

  - id: 'push-prophet-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:${_TAG}']
    waitFor: ['build-prophet-api']

  - id: 'push-lstm-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:${_TAG}']
    waitFor: ['build-lstm-api']

  # ── Deploy to Cloud Run ──

  - id: 'deploy-data-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'data-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=DB_TYPE=sqlite,PYTHONPATH=/app'
    waitFor: ['push-data-api']

  - id: 'deploy-forecast-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'forecast-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=PYTHONPATH=/app'
    waitFor: ['push-forecast-api']

  - id: 'deploy-prophet-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prophet-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=10'
      - '--cpu-boost'
      - '--set-env-vars=USE_GCS=false,PYTHONPATH=/app'
    waitFor: ['push-prophet-api']

  - id: 'deploy-lstm-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lstm-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=4'
      - '--cpu-boost'
      - '--set-env-vars=USE_GCS=false,PYTHONPATH=/app'
    waitFor: ['push-lstm-api']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/data-api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/forecast-api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/prophet-api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/weather/lstm-api:${_TAG}'

timeout: '2400s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
