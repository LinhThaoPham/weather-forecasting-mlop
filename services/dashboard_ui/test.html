<!DOCTYPE html>
<html>
<head>
    <title>Test Model Monitor Button</title>
</head>
<body>
    <h1>Model Monitor Button Test</h1>
    <button id="nav-monitor" onclick="testClick()">Click Me</button>
    <div id="status">Not clicked yet</div>
    
    <script>
        function testClick() {
            console.log("Button clicked!");
            document.getElementById("status").textContent = "✓ Button click handler works!";
            
            // Try to load monitor data
            fetch('http://127.0.0.1:8001/model/registry')
                .then(r => r.json())
                .then(data => {
                    console.log("✓ API response:", data.current_version);
                    document.getElementById("status").textContent += "\n✓ API call successful: " + data.current_version;
                })
                .catch(e => {
                    console.error("✗ API error:", e);
                    document.getElementById("status").textContent += "\n✗ API error: " + e.message;
                });
        }
    </script>
</body>
</html>
